name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  pnpm-audit:
    name: pnpm audit (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.0
        with:
          version: 10.30.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 22.22.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: audit production deps (high+)
        run: pnpm audit --prod --audit-level=high
      - name: audit all deps (report only)
        run: pnpm audit --audit-level=low || true

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.0.0
        with:
          sarif_file: scorecard-results.sarif
