name: Bug report
description: Something in the template itself is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before submitting, please
        confirm `pnpm check` is green on a fresh clone — if not, that's the bug.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps. Include exact commands and file paths.
      placeholder: |
        1. Clone the template into a fresh directory
        2. Run `pnpm install && pnpm check`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste any error output verbatim.
      render: shell
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: '22.22.0'
    validations:
      required: true

  - type: input
    id: pnpm-version
    attributes:
      label: pnpm version
      placeholder: '10.30.3'
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: 'macOS 15.4 / Ubuntu 24.04 / Windows 11'
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant — config changes, AI agent involved, recent commits.
